name: Publish package

on:
  workflow_dispatch:
    inputs:
      package:
        description: npm package to publish
        required: true
        type: choice
        options:
          - provider-base
          - provider-openai
          - provider-flux
          - provider-sdxl
          - provider-heygen

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @mosvera/${{ inputs.package }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Verify workspace
        run: npm run ci

      - name: Publish package
        run: npm publish --workspace @mosvera/${{ inputs.package }} --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
